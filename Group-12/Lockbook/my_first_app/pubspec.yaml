name: my_first_app
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  device_preview: ^1.3.1
  url_launcher: ^6.3.2
  image_picker: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  local_auth: ^3.0.1
  otp: ^3.1.4
  qr_flutter: ^4.1.0
  flutter_local_notifications: ^17.2.1
  http: ^1.2.1

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
   
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/lockbook.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/lockbook.png
    - assets/icon/security.png