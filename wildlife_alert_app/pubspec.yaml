name: wildlife_alert_app
description: A complete wildlife alert app with login, alerts, and image upload
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.9.1
  image_picker: ^0.8.7+6
  flutter_local_notifications: ^17.0.0
  photo_view: ^0.15.0
  timeago: ^3.7.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  geolocator: ^10.0.0
  geocoding: ^2.1.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  shared_preferences: ^2.2.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true